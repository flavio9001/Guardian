<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Org VIP Completo</title><style>:root{--ceo: #ff00ff;--mgr: #8a2be2;--emp: #e6e6fa;}.vip-card{border:1px solid #ccc;padding:20px;margin:20px;border-radius:8px;}.org-node{padding:10px;margin:5px;border:1px solid #000;display:inline-block;}.ceo{background-color:var(--ceo);}.mgr{background-color:var(--mgr);}.emp{background-color:var(--emp);}</style></head><body><div id="app"><h1>Carregando VIPs...</h1></div><script src="exportService.js"></script><script>async function loadVIPs(){try{const response=await fetch('/api/vips');if(!response.ok)throw new Error('Erro na API');const vips=await response.json();const app=document.getElementById('app');app.innerHTML='';vips.forEach(vip=>{const container=document.createElement('div');container.className='vip-card';container.innerHTML=`<h2>${vip.nome}</h2><div id="org-${vip.id}"></div><button onclick="exportService.toJPG('org-${vip.id}')">Exportar JPG</button><button onclick="exportService.toWhatsApp('${vip.nome}')">Enviar WhatsApp</button>`;app.appendChild(container);renderOrg(vip.estrutura,`org-${vip.id}`);});}catch(e){document.getElementById('app').innerHTML='Erro ao carregar dados: '+e.message;}}function renderOrg(data,parentId){const container=document.getElementById(parentId);const node=document.createElement('div');node.className=`org-node ${data.role}`;node.innerText=data.nome;container.appendChild(node);if(data.subordinados)data.subordinados.forEach(sub=>renderOrg(sub,parentId));}loadVIPs();</script></body></html>
