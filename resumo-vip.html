<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Resumo VIP</title><style>:root{--primary-color:#2c3e50;--accent-color:#3498db;--success-color:#27ae60;--error-color:#c0392b;--bg-color:#f4f7f6}body{font-family:sans-serif;background-color:var(--bg-color);display:flex;justify-content:center;padding:20px}.card{background:white;padding:20px;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.1);width:100%;max-width:400px;border-top:5px solid var(--primary-color)}.actions{margin-top:20px;display:flex;gap:10px}button{flex:1;padding:10px;border:none;border-radius:4px;cursor:pointer;color:white;font-weight:bold}#btn-jpg{background-color:var(--accent-color)}#btn-wpp{background-color:var(--success-color)}#feedback{margin-top:15px;text-align:center;font-size:0.9em;min-height:20px}</style></head><body><div class="card" id="vip-card"><h2>Resumo do VIP</h2><p><strong>Nome:</strong> João Silva</p><p><strong>Cargo:</strong> Diretor Executivo</p><div class="actions"><button id="btn-jpg">Exportar JPG</button><button id="btn-wpp">WhatsApp</button></div><div id="feedback"></div></div><script src="exportService.js"></script><script>const feedback=document.getElementById('feedback');const showFeedback=(msg,type)=>{feedback.textContent=msg;feedback.style.color=type==='error'?'var(--error-color)':'var(--success-color)';};document.getElementById('btn-jpg').addEventListener('click',async()=>{showFeedback('Gerando imagem...', 'info');try{await exportService.toJPG('vip-card');showFeedback('Sucesso!', 'success');}catch(e){showFeedback('Erro ao exportar', 'error');}});document.getElementById('btn-wpp').addEventListener('click',async()=>{showFeedback('Preparando envio...', 'info');try{await exportService.toWhatsApp('vip-card');showFeedback('Enviado!', 'success');}catch(e){showFeedback('Erro no envio', 'error');}});</script></body></html>
