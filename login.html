<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Guardian - Login</title><style>:root{--primary:#2563eb;--error:#dc2626;--bg:#f3f4f6}body{font-family:sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:center;height:100vh;margin:0}.login-card{background:white;padding:2rem;border-radius:8px;box-shadow:0 4px 6px rgba(0,0,0,0.1);width:90%;max-width:400px}.form-group{margin-bottom:1rem}label{display:block;margin-bottom:.5rem}select,input{width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}button{width:100%;padding:.75rem;background:var(--primary);color:white;border:none;border-radius:4px;cursor:pointer;margin-top:1rem}#message{margin-top:1rem;text-align:center;font-size:0.9rem}#spinner{display:none;text-align:center;margin:10px 0}.hidden{display:none}</style></head><body><div class="login-card"><h2>Login Guardian</h2><form id="loginForm"><div class="form-group"><label for="employeeSelect">Funcionário</label><select id="employeeSelect" required><option value="">Carregando...</option></select></div><div class="form-group"><label for="password">Senha</label><input type="password" id="password" required></div><button type="submit" id="submitBtn">Entrar</button></form><div id="spinner">Processando...</div><div id="message"></div></div><script src="employeeDropdown.js"></script><script>console.log("[DEBUG] Initializing login page");const form=document.getElementById('loginForm');const msg=document.getElementById('message');const spinner=document.getElementById('spinner');form.addEventListener('submit',async(e)=>{e.preventDefault();console.log("[DEBUG] Form submitted");spinner.style.display='block';msg.textContent='';try{const user=document.getElementById('employeeSelect').value;const pass=document.getElementById('password').value;if(!user||!pass)throw new Error('Preencha todos os campos');console.log("[DEBUG] Attempting auth for: ",user);await new Promise(resolve=>setTimeout(resolve,1500));msg.style.color='green';msg.textContent='Login realizado com sucesso!';}catch(err){console.error("[DEBUG] Error: ",err.message);msg.style.color='var(--error)';msg.textContent=err.message;}finally{spinner.style.display='none';}});</script></body></html>
